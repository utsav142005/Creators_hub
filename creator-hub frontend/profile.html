<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Creator Profile — CreatorHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .profile-page { max-width: 900px; margin: 100px auto 60px; padding: 0 20px; }
    .profile-banner { height: 220px; border-radius: var(--radius); background: linear-gradient(135deg, var(--accent), var(--accent-2)); position: relative; margin-bottom: 70px; }
    .profile-avatar-wrap { position: absolute; bottom: -50px; left: 40px; }
    .profile-avatar-wrap img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #fff; object-fit: cover; box-shadow: var(--shadow-md); }
    .profile-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; margin-bottom: 32px; }
    .profile-name { font-family: var(--font-head); font-size: 1.8rem; font-weight: 700; }
    .profile-title { color: var(--ink-muted); margin-top: 4px; }
    .profile-location { color: var(--ink-muted); font-size: .9rem; margin-top: 6px; }
    .profile-location i { color: var(--accent); margin-right: 4px; }
    .profile-bio { background: var(--surface-2); border-radius: var(--radius); padding: 24px; margin-bottom: 32px; line-height: 1.8; color: var(--ink-light); }
    .section-title { font-family: var(--font-head); font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; }
    .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .service-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; transition: box-shadow .2s; }
    .service-card:hover { box-shadow: var(--shadow-md); }
    .service-card h4 { font-family: var(--font-head); font-size: 1rem; margin-bottom: 8px; }
    .service-card p { color: var(--ink-muted); font-size: .87rem; margin-bottom: 16px; line-height: 1.6; }
    .service-meta { display: flex; justify-content: space-between; align-items: center; }
    .service-price { font-weight: 700; color: var(--accent); font-size: 1.1rem; }
    .service-days { font-size: .82rem; color: var(--ink-muted); }
    .profile-loading { text-align: center; padding: 80px 20px; color: var(--ink-muted); }
    .no-services { color: var(--ink-muted); font-style: italic; }
    .debug-box { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 16px; margin: 20px 0; font-size: .85rem; font-family: monospace; }
  </style>
</head>
<body>

  <nav id="navbar">
    <a class="nav-logo" href="index.html"><span><i class="fas fa-bolt"></i></span>CreatorHub</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#categories">Explore</a></li>
      <li><a href="signup.html" style="color:var(--accent);font-weight:600">Become a Creator</a></li>
    </ul>
    <div class="nav-actions">
      <a class="btn btn-ghost" href="login.html">Login</a>
      <a class="btn btn-primary" href="signup.html">Sign Up</a>
    </div>
    <div class="nav-hamburger" onclick="toggleMenu()">
      <i class="fas fa-bars" id="burger-icon"></i>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html" onclick="toggleMenu()">Home</a>
    <a href="index.html#categories" onclick="toggleMenu()">Explore</a>
    <a href="signup.html" onclick="toggleMenu()">Become a Creator</a>
    <div class="nav-actions" style="display:flex;gap:10px;flex-direction:column;margin-top:8px;">
      <a class="btn btn-ghost btn-full" href="login.html">Login</a>
      <a class="btn btn-primary btn-full" href="signup.html">Sign Up</a>
    </div>
  </div>

  <div class="profile-page" id="profile-page">
    <div class="profile-loading">
      <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--accent)"></i>
      <p style="margin-top:16px">Loading profile...</p>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    const BACKEND = 'https://creators-hub-xbxl.onrender.com';

    // Step 1: Read the ?id= from the URL
    const params    = new URLSearchParams(window.location.search);
    const creatorId = params.get('id');

    // Step 2: Show error if no ID in URL
    if (!creatorId) {
      document.getElementById('profile-page').innerHTML = `
        <div style="text-align:center;padding:80px">
          <p style="color:var(--ink-muted)">No creator ID found in URL.</p>
          <a href="index.html" class="btn btn-primary" style="margin-top:16px">Go Back Home</a>
        </div>`;
    } else {
      loadProfile(creatorId);
    }

    async function loadProfile(id) {
      const page = document.getElementById('profile-page');

      try {
        // Step 3: Fetch user from backend
        const url      = `${BACKEND}/api/users/${id}`;
        const response = await fetch(url);
        const data     = await response.json();

        // Step 4: If backend says user not found
        if (!response.ok || !data.success) {
          page.innerHTML = `
            <div style="text-align:center;padding:60px 20px">
              <div style="font-size:3rem">😕</div>
              <h2 style="margin:16px 0 8px;font-family:var(--font-head)">Creator Not Found</h2>
              <p style="color:var(--ink-muted);margin-bottom:24px">
                There is no creator with ID <strong>${id}</strong> in the database yet.
              </p>
              <div class="debug-box">
                <strong>To fix this:</strong><br>
                1. Go to <a href="signup.html">signup.html</a> and create a creator account<br>
                2. Then visit <a href="javascript:void(0)" onclick="window.location.href='profile.html?id=1'">profile.html?id=1</a>
              </div>
              <a href="index.html" class="btn btn-primary">← Back to Home</a>
            </div>`;
          return;
        }

        // Step 5: Extract user and services
        const user     = data.user;
        const services = data.services || [];

        // Step 6: Build avatar URL
        const avatarUrl = user.avatar ||
          `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=5b3bf5&color=fff&size=200`;

        // Step 7: Build services cards
        const servicesHTML = services.length > 0
          ? services.map(s => `
              <div class="service-card">
                <h4>${s.title}</h4>
                <p>${s.description.substring(0, 100)}${s.description.length > 100 ? '...' : ''}</p>
                <div class="service-meta">
                  <span class="service-price">₹${Number(s.price).toLocaleString()}</span>
                  <span class="service-days"><i class="fas fa-clock"></i> ${s.delivery_days} days</span>
                </div>
              </div>`).join('')
          : '<p class="no-services">This creator has not listed any services yet.</p>';

        // Step 8: Render full profile
        page.innerHTML = `
          <div class="profile-banner">
            <div class="profile-avatar-wrap">
              <img src="${avatarUrl}" alt="${user.name}" onerror="this.src='https://ui-avatars.com/api/?name=User&background=5b3bf5&color=fff'"/>
            </div>
          </div>

          <div class="profile-header">
            <div>
              <div class="profile-name">${user.name}</div>
              <div class="profile-title">${user.bio ? user.bio.split('.')[0] : 'Creative Professional'}</div>
              ${user.location ? `<div class="profile-location"><i class="fas fa-map-marker-alt"></i> ${user.location}</div>` : ''}
              <div style="margin-top:8px">
                <span style="background:var(--surface-2);padding:4px 12px;border-radius:100px;font-size:.8rem;color:var(--accent);font-weight:600;text-transform:capitalize">
                  ${user.role}
                </span>
              </div>
            </div>
            <a class="btn btn-primary" href="mailto:${user.email}">
              <i class="fas fa-envelope"></i> Contact
            </a>
          </div>

          ${user.bio ? `
          <div class="profile-bio">
            <strong style="font-family:var(--font-head)">About</strong>
            <p style="margin-top:10px">${user.bio}</p>
          </div>` : ''}

          <div class="section-title">Services Offered</div>
          <div class="services-grid">${servicesHTML}</div>

          <a href="index.html" style="color:var(--accent);text-decoration:none;font-size:.9rem">
            <i class="fas fa-arrow-left"></i> Back to all creators
          </a>
        `;

        document.title = `${user.name} — CreatorHub`;

      } catch (err) {
        // Step 9: Network error (backend not running)
        page.innerHTML = `
          <div style="text-align:center;padding:60px 20px">
            <div style="font-size:3rem">🔌</div>
            <h2 style="margin:16px 0 8px;font-family:var(--font-head)">Backend Not Running</h2>
            <p style="color:var(--ink-muted);margin-bottom:16px">Cannot connect to the server.</p>
            <div class="debug-box">
              <strong>Fix:</strong> Open CMD and run:<br><br>
              <code>cd path/to/creatorhub-backend</code><br>
              <code>npm run dev</code><br><br>
              Then refresh this page.
            </div>
            <a href="index.html" class="btn btn-primary">← Back to Home</a>
          </div>`;
      }
    }
  </script>

</body>
</html>
